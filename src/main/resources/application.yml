spring:
  datasource:
    url: jdbc:mysql://localhost:3306/card_trading?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: yourpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.sungshincard.backend.domain
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.sungshincard.backend: debug

jwt:
  secret: your-very-secure-random-secret-key-that-is-at-least-32-characters-long
  expiration: 86400000 # 24 hours

